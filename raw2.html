    <script>
    document.addEventListener('DOMContentLoaded', function () {
      const sourceUl = document.querySelector(
        '.header__submenu.list-menu.list-menu--disclosure.caption-large[role="list"]'
      );
      if (!sourceUl) return;
      const links = sourceUl.querySelectorAll(
        'a.header__menu-item.list-menu__item.link.link--text.focus-inset.caption-large'
      );
      if (!links.length) return;

      const targetUls = document.querySelectorAll(
        '.footer-block__details-content.list-unstyled.list-shop'
      );
      if (!targetUls.length) return;

      targetUls.forEach(function (targetUl) {
        targetUl.innerHTML = '';

        links.forEach(function (link) {
          const href = link.getAttribute('href');
          const text = link.textContent.trim();

          if (!href || !text) return;

          const li = document.createElement('li');
          li.className = 'footer-menu-link';

          const a = document.createElement('a');
          a.href = href;
          a.className = 'link link--text list-menu__item list-menu__item--link';
          a.textContent = text;

          li.appendChild(a);
          targetUl.appendChild(li);
        });
      });
    });
    </script>
