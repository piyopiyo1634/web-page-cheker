# REV: 2026-03-16T02:47:39+09:00
name: web-page-checker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # Run once per hour.

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install

      - name: Fetch & normalize current page
        run: |
          mkdir -p snapshots
          node normalize_html.js "https://bk-japan.myshopify.com/" > snapshots/current_test.html
          head -n 5 snapshots/current_test.html

      - name: Compare snapshot
        id: diff
        run: |
          echo "===== diff start ====="
          if [ ! -f snapshots/last_test.html ]; then
            echo "No previous snapshot."
            cp snapshots/current_test.html snapshots/last_test.html
            : > snapshots/last_diff.txt
            echo "plus_lines=0" >> "$GITHUB_OUTPUT"
            echo "minus_lines=0" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          diff_result=$(diff -q snapshots/current_test.html snapshots/last_test.html || true)
          echo "diff_result=$diff_result"
          if [ -z "$diff_result" ]; then
            echo "No change detected."
            : > snapshots/last_diff.txt
            echo "plus_lines=0" >> "$GITHUB_OUTPUT"
            echo "minus_lines=0" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Change detected!"
            diff snapshots/last_test.html snapshots/current_test.html > snapshots/last_diff.txt || true
            cat snapshots/last_diff.txt

            diff -U 0 snapshots/last_test.html snapshots/current_test.html > snapshots/last_diff_unified.txt || true
            plus_lines=$(grep -E '^\+[^+]' snapshots/last_diff_unified.txt | wc -l | tr -d ' ')
            minus_lines=$(grep -E '^-[^-]' snapshots/last_diff_unified.txt | wc -l | tr -d ' ')
            rm -f snapshots/last_diff_unified.txt

            echo "plus_lines=${plus_lines}" >> "$GITHUB_OUTPUT"
            echo "minus_lines=${minus_lines}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save & Commit if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp snapshots/current_test.html snapshots/last_test.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git merge --ff-only origin/main || true

          git add snapshots/last_test.html
          git add snapshots/last_diff.txt
          git commit -m "Update snapshot" || true

          git push origin HEAD:main || echo "Push failed, but continue."

      - name: Send LINE notification
        if: steps.diff.outputs.changed == 'true'
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: |
          IFS=',' read -ra IDS <<< "$LINE_USER_IDS"
          for ID in "${IDS[@]}"; do
            curl -X POST https://api.line.me/v2/bot/message/push \
              -H "Authorization: Bearer ${LINE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"to\": \"${ID}\",
                \"messages\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"Burger King page changed\nhttps://bk-japan.myshopify.com/\n変更行数: +${{ steps.diff.outputs.plus_lines }}行 -${{ steps.diff.outputs.minus_lines }}行\"
                  }
                ]
              }"
          done

      - name: Show result
        run: echo "changed = ${{ steps.diff.outputs.changed }}"
